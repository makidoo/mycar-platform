services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mycar_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: always
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn mycar.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    environment:
      DEBUG:         "False"
      SECRET_KEY:    ${SECRET_KEY}
      DB_HOST:       db
      DB_NAME:       ${DB_NAME}
      DB_USER:       ${DB_USER}
      DB_PASSWORD:   ${DB_PASSWORD}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      MOCK_SERVICES: "False"
      # False si l'appli est exposée directement (ex: localtunnel sur le port 8000)
      # sans proxy transmettant X-Forwarded-Proto — sinon boucle de redirection HTTPS.
      FORCE_HTTPS:   ${FORCE_HTTPS:-True}
    volumes:
      - static_files:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mycar_net

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/var/www/static:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - web
    networks:
      - mycar_net

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"

volumes:
  postgres_data:
  static_files:
  certbot_www:
  certbot_conf:

networks:
  mycar_net:
    driver: bridge
