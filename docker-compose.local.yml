
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-mycar_local}
      POSTGRES_USER: ${DB_USER:-mycar_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localpass123}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    networks:
      - mycar_local_network

  web:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    environment:
      # Overrides : en interne au réseau Docker, le container "db" est
      # toujours joignable sur host=db, port=5432 — peu importe la valeur
      # de DB_HOST/DB_PORT dans .env (qui sert aux connexions hors Docker
      # et au port publié côté hôte)
      - DB_HOST=db
      - DB_PORT=5432
    volumes:
      - .:/app
    ports:
      - "${WEB_PORT:-8000}:8000"
    depends_on:
      - db
    networks:
      - mycar_local_network

volumes:
  postgres_data_local:

networks:
  mycar_local_network:
    driver: bridge
