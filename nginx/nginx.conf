# Redirection HTTP → HTTPS
server {
    listen 80;
    server_name votre-domaine.ne www.votre-domaine.ne;

    # Validation Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name votre-domaine.ne www.votre-domaine.ne;

    ssl_certificate     /etc/letsencrypt/live/votre-domaine.ne/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/votre-domaine.ne/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    # Fichiers statiques servis directement par Nginx
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy vers Gunicorn
    location / {
        proxy_pass         http://web:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
